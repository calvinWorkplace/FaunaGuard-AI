<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/upload.css') }}">
    <script type="text/javascript" src="{{ url_for('static', filename='js/Validation.js') }}" defer></script>
</head>
<body>

    <div class="navbar">
        <div class="logo">
            <a href="{{ url_for('home') }}"><img src="{{ url_for('static', filename='assets/Logo.png') }}" alt="gambar tidak ada"></a>
        </div>
        
        <div class="navbar-container">
            <div class="judulLogo">
                <h1><a href="{{ url_for('home') }}">FaunaGuard</a></h1>
                <h4>Protecting Wildlife, One Scan at a Time</h4>
            </div>
            <ul class="navbar-menu" id="menu">
                <li class="navbar-item">
                    <a href="{{ url_for('home') }}" class="navbar-link">Home</a>
                </li>
                <li class="navbar-item">
                    <a href="{{ url_for('upload_file') }}" class="navbar-link">Upload</a>
                </li>
                <li class="navbar-item">
                    <a href="{{ url_for('login') }}" class="navbar-link">Login</a>
                </li>
            </ul>
        </div>
    </div>

    <div class="UploadImage">
        <h1>Upload Image</h1>
        <form method="POST" enctype="multipart/form-data">
            <div id="preview-container" style="display: none;" >
                <img id="preview-image" src="" alt="Preview" style="height: 200px; border: 1px solid #ccc; border-radius: 5px;">
            </div>            
            <label class="file-upload">
                <input type="file" id="file-input" name="file" accept="image/*" onchange="previewImage(this)">
                Choose File
            </label>            
            <button type="submit">Upload</button>
        </form>
    </div>
    <script>
        function previewImage(input) {
            const previewContainer = document.getElementById('preview-container');
            const previewImage = document.getElementById('preview-image');
            if (input.files && input.files[0]) {
                const reader = new FileReader();

                reader.onload = function(e) {
                    previewImage.src = e.target.result;
                    previewContainer.style.display = 'block';
                };

                reader.readAsDataURL(input.files[0]);
            } else {
                previewContainer.style.display = 'none';
                previewImage.src = "";
            }
        }
    </script>
</body>
</html>
