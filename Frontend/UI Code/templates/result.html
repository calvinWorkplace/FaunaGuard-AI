<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/result.css') }}">
    <script type="text/javascript" src="{{ url_for('static', filename='js/Validation.js') }}" defer></script>
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <a href="{{ url_for('home') }}"><img src="{{ url_for('static', filename='assets/Logo.png') }}" alt="gambar tidak ada"></a>
        </div>
        
        <div class="navbar-container">
            <div class="judulLogo">
                <h1><a href="{{ url_for('home') }}">FaunaGuard</a></h1>
                <h4>Protecting Wildlife, One Scan at a Time</h4>
            </div>
            <ul class="navbar-menu" id="menu">
                <li class="navbar-item">
                    <a href="{{ url_for('home') }}" class="navbar-link">Home</a>
                </li>
                <li class="navbar-item">
                    <a href="{{ url_for('upload_file') }}" class="navbar-link">Upload</a>
                </li>
                <li class="navbar-item">
                    <a href="{{ url_for('login') }}" class="navbar-link">Login</a>
                </li>
            </ul>
        </div>
    </div>
    <div class="ResultImage">
        <h1>Prediction Result</h1>
        <img src="{{ url_for('static', filename='uploads/' + image_file) }}" alt="Uploaded Image" style="max-width: 400px;">
        <h2>Prediction: {{ prediction }}</h2>
        <h3>Confidence: {{ '%.2f' % (confidence * 100) }}%</h3>
        <h3>Status: {{ status }}</h3>

        <!-- Button to go back to the upload page -->
        <form action="{{ url_for('upload_file') }}">
            <button type="submit">Upload Another Image</button>
        </form>
    </div>
    
</body>
</html>
